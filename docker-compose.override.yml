services:
  php:
    build:
      context: ./docker/php
    container_name: kanban_php
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: myapp_db
      DB_USER: postgres
      DB_PASS: postgres
      JWT_SECRET: ${JWT_SECRET:-kanban_jwt_secret_32_chars_min_x}
    networks:
      - default

  nginx:
    build:
      context: ./docker/nginx
    container_name: kanban_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      - php
    networks:
      - default

  frontend:
    build:
      context: ./docker/frontend
      target: dev
    container_name: kanban_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080/api
    networks:
      - default
