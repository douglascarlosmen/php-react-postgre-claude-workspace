version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg_hba.conf:/var/lib/postgresql/pg_hba.conf
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "hba_file=/var/lib/postgresql/pg_hba.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-mcp-full:
    image: node:20-alpine
    container_name: postgres_mcp_full
    working_dir: /app
    command: npx -y mcp-postgres-full-access postgresql://postgres:postgres@postgres:5432/myapp_db
    environment:
      DATABASE_URI: postgresql://postgres:postgres@postgres:5432/myapp_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

volumes:
  postgres_data:
